  .css-typing p:nth-child(3) {
    width: 2.9em;
    opacity: 0;

      blink 0.5s step-end infinite alternate;
    animation: type3 0.2s steps(50, end), blink 0.5s step-end infinite alternate;
    -webkit-animation-delay: 10s;
    animation-delay: 7s;
    -webkit-animation-fill-mode: forwards;
    animation-fill-mode: forwards;
  }
  .css-typing p:nth-child(4) {
    width: 15em;
    opacity: 0;
    -webkit-animation: type3 0.2s steps(50, end),

    animation-delay: 7.2s;
    -webkit-animation-fill-mode: forwards;
    animation-fill-mode: forwards;
  }
  .css-typing p:nth-child(5) {
    width: 3em;
    opacity: 0;
    -webkit-animation: type3 0.2s steps(50, end),
      blink 0.5s step-end infinite alternate;
    animation: type3 0.2s steps(50, end), blink 0.5s step-end infinite alternate;
    -webkit-animation-delay: 7.4s;
    animation-delay: 7.4s;
    -webkit-animation-fill-mode: forwards;
    animation-fill-mode: forwards;
  }
  .css-typing p:nth-child(6) {
    width: 18em;
    opacity: 0;
    -webkit-animation: type3 0.2s steps(50, end),
      blink 0.5s step-end infinite alternate;

    animation-delay: 7.6s;
    -webkit-animation-fill-mode: forwards;
    animation-fill-mode: forwards;
  }
  .css-typing p:nth-child(7) {
    width: 6em;
    opacity: 0;
    -webkit-animation: type3_extra 0.2s steps(50, end),
      blink 0.5s step-end infinite alternate;
    animation: type3_extra 0.2s steps(50, end),

    -webkit-animation-delay: 9s;
    animation-delay: 9s;
    -webkit-animation-fill-mode: forwards;
    animation-fill-mode: forwards;
  }
  @keyframes type3 {
    0% {
      width: 0;
    }
    1% {
      opacity: 1;
    }
    99.9% {
      border-right: 0.15em solid green;
    }
    100% {
      opacity: 1;
      border: none;
    }
  }
  @keyframes type3_extra {
    0% {
      width: 0;
    }
    1% {
      opacity: 1;
    }
    100% {
      opacity: 1;
    }
  }

  @-webkit-keyframes type3 {
    0% {
      width: 0;
    }
    1% {
      opacity: 1;
    }
    99.9% {
      border-right: 0.15em solid green;
    }
    100% {

      border: none;
    }

  @-webkit-keyframes type3_extra {
    0% {
      width: 0;
    }
    1% {
      opacity: 1;
    }
    100% {
      opacity: 1;
    }
  }

  @keyframes blink {
    50% {
      border-color: transparent;
    }
  }
  @-webkit-keyframes blink {
    50% {
      border-color: tranparent;
    }
  }
</style>
